apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx-demo

spec:
  replicas: 2

  selector:
    matchLabels:
      app: nginx-demo

  template:
    metadata:
      labels:
        app: nginx-demo

    spec:
      containers:
      - name: nginx

        image: YOUR_DOCKERHUB_USERNAME/nginx-demo:latest

        ports:
        - containerPort: 80
